# Reasonix + Roslyn MCP Server 集成配置模板
#
# 注意：Windows 路径请用正斜杠（/），TOML 中反斜杠会触发 \U 转义。
#
# 一键安装：./install.sh 或 install.bat
# 手动注册：reasonix mcp add roslyn dotnet exec "C:/path/to/roslyn-mcp-server.dll"
#
# tier 说明：
#   "background" — 后台连接，不阻塞（默认）
#   "eager"      — 阻塞直到握手完成
#   "lazy"       — 首次使用时启动

# ── standalone 模式（单文件分析，不加载项目引用）──────────────────────

[[plugins]]
name    = "roslyn"
command = "dotnet"
args    = ["exec", "C:/Users/yourname/roslyn-mcp-server/src/RoslynMcpServer/bin/Release/net11.0/roslyn-mcp-server.dll"]
tier    = "background"

# ── 项目模式（加载真实 .sln，解析全部 NuGet 引用）─────────────────────
# 加 --workspace 参数：
# args = ["exec", "C:/path/to/roslyn-mcp-server.dll", "--workspace", "C:/path/to/YourSolution.sln"]
