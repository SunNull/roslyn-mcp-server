name: Release

# 触发条件：推送 v* 标签时自动构建并发布到 GitHub Releases
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # 也支持手动触发

jobs:
  build-and-release:
    permissions:
      contents: write  # gh release upload 权限

    strategy:
      matrix:
        include:
          # 三个平台，每个一个 self-contained 包
          - os: ubuntu-latest
            rid: linux-x64
            archive: tar.gz
          - os: macos-latest
            rid: osx-arm64
            archive: tar.gz
          - os: windows-latest
            rid: win-x64
            archive: zip

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 11
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '11.0.100-preview.5.26302.115'

      - name: Publish (self-contained, single-file)
        run: |
          dotnet publish src/RoslynMcpServer -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=false \
            -p:PublishTrimmed=false \
            -o ./publish

      - name: Create archive (Unix)
        if: matrix.archive == 'tar.gz'
        run: |
          cd ./publish
          tar -czf ../roslyn-mcp-server-${{ matrix.rid }}.tar.gz .

      - name: Create archive (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path ./publish/* -DestinationPath ../roslyn-mcp-server-${{ matrix.rid }}.zip

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: roslyn-mcp-server-${{ matrix.rid }}.${{ matrix.archive }}
          generate_release_notes: true
